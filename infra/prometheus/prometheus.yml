global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

  # Optional: if your services expose Prometheus-format /metrics,
  # you can add them here later, e.g.
  #
  # - job_name: platform-services
  #   metrics_path: /metrics
  #   static_configs:
  #     - targets:
  #         - governance:8080
  #         - policy:8080
  #         - tasks:8080
  #         - ledger:8080
  #         - distributions:8080
  #         - audit:8080
